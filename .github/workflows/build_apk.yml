name: Build APK

on:
  push:
    branches: [ "master" ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.8'
          cache: true

      - name: Get dependencies
        run: flutter pub get
      
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/exemplifica-new.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=exemplifica.jks" >> android/key.properties
      
      - name: Determine version (tag or pubspec)
        shell: bash
        run: |
          PUBSPEC_VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}')"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"   # v3.0.1+2 -> 3.0.1+2
            echo "VERSION=$TAG_VERSION" >> "$GITHUB_ENV"
            echo "PUBSPEC_VERSION=$PUBSPEC_VERSION" >> "$GITHUB_ENV"
          else
            echo "VERSION=$PUBSPEC_VERSION" >> "$GITHUB_ENV"
          fi

      - name: Guard rail (tag must match pubspec)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          if [[ "${VERSION}" != "${PUBSPEC_VERSION}" ]]; then
            echo "Tag (${GITHUB_REF_NAME}) != pubspec.yaml version (${PUBSPEC_VERSION})."
            echo "Fix: bump pubspec.yaml to ${VERSION} (or retag)."
            exit 1
          fi

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk exemplifica-v${VERSION}-arm64-v8a.apk
          mv app-armeabi-v7a-release.apk exemplifica-v${VERSION}-armeabi-v7a.apk
          mv app-x86_64-release.apk exemplifica-v${VERSION}-x86_64.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: exemplifica_v${{ env.VERSION }}
          path: build/app/outputs/flutter-apk/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}