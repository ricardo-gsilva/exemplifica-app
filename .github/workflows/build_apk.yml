name: Build APK

on:
  push:
    branches: [ "master" ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.8'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Get app version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk

          mv app-arm64-v8a-release.apk exemplifica-v${VERSION}-arm64-v8a.apk
          mv app-armeabi-v7a-release.apk exemplifica-v${VERSION}-armeabi-v7a.apk
          mv app-x86_64-release.apk exemplifica-v${VERSION}-x86_64.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: exemplifica_v${{ env.VERSION }}
          path: build/app/outputs/flutter-apk/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}